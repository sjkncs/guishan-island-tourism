  { subdomains: '1234', maxZoom: 18, attribution: '© 高德地图' }
);

// 高德路网标注层

  'https://webst0{s}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}',
  { subdomains: '1234', maxZoom: 18, attribution: '' }
);

// OSM备用
const osmTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 19, attribution: '© OpenStreetMap' });

  center: [22.140, 113.828],
  zoom: 15,
  layers: [amapSatTile, amapAnnoTile],
});

// 图层切换
const baseLayers = {
  '高德卫星+标注': L.layerGroup([amapSatTile, amapAnnoTile]).addTo(map),
  '高德卫星': amapSatTile,
  'OpenStreetMap': osmTile,
};
L.control.layers(baseLayers).addTo(map);

// 添加POI标记
POI_DATA.forEach(poi => {
  const style = CAT_STYLE[poi.category] || { color: '#757575' };
  const isKey = KEY_POIS.some(k => poi.name.includes(k));

  const marker = L.circleMarker([poi.location.lat, poi.location.lng], {
    radius: isKey ? 7 : 5,
    fillColor: style.color,
    color: 'white',
    weight: 1.5,
    fillOpacity: 0.9,
  }).addTo(map);

  const popupContent = `<div class="info-popup">
    <b>${poi.name}</b><br>
    类别: ${poi.category}<br>
    评分: ${poi.rating || '暂无'}<br>
    地址: ${poi.address || '暂无'}<br>
    <span style="color:#999;font-size:11px">${poi.location.lng.toFixed(6)}, ${poi.location.lat.toFixed(6)}</span>
  </div>`;
  marker.bindPopup(popupContent);

  if (isKey) {
    const shortName = poi.name.replace('珠海桂山岛','').replace('桂山岛','');
    marker.bindTooltip(shortName, {
      permanent: true, direction: 'right', offset: [8, 0],
      className: 'poi-tooltip',
    });
  }
});
